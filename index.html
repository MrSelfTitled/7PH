<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Seven Pound Halo — Official Site</title>

<style>
:root{
  --bg: #07070b;
  --text:#f1f1f6;
  --muted:#b8b8c7;
  --line: rgba(255,255,255,0.12);
}

body{
  margin:0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color:var(--text);
}

/* NAV */
.topbar{
  position:fixed;
  top:0; left:0; right:0;
  display:flex;
  justify-content:space-between;
  padding:15px;
  background: rgba(0,0,0,0.6);
}

/* HERO WITH IMAGE */
.hero{
  min-height:100vh;
  display:flex;
  align-items:flex-end;
  padding:100px 20px;

  background:
    linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.95)),
    url("./images/group-black-and-white.jpg");

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

.hero h1{
  font-size:60px;
  margin:0;
}

.section{
  padding:60px 20px;
}

.video{
  width:100%;
  height:500px;
}

.links a{
  display:block;
  margin:10px 0;
  color:white;
}

.footer{
  text-align:center;
  padding:20px;
  color:#888;
}
</style>
</head>

<body>

<div class="topbar">
  <div>Seven Pound Halo</div>
  <div>
    <a href="#music">Music</a>
    <a href="#video">Video</a>
    <a href="#links">Links</a>
  </div>
</div>

<section class="hero">
  <div>
    <h1>Seven Pound Halo</h1>
    <p>Melbourne • Alternative Rock / Grungegaze</p>
  </div>
</section>

<section id="music" class="section">
  <h2>Music</h2>
  <p>Stream now:</p>
  <a href="https://open.spotify.com/artist/0glhLfayMZXHMZyV4nPmqL" target="_blank">Spotify</a>
</section>

<section id="video" class="section">
  <iframe class="video"
    src="https://www.youtube.com/embed/KFNsTHJj93Q"
    allowfullscreen>
  </iframe>
</section>

<section id="links" class="section links">
  <h2>Links</h2>
  <a href="https://www.instagram.com/sevenpoundhalo">Instagram</a>
  <a href="https://www.tiktok.com/@sevenpoundhalo">TikTok</a>
  <a href="https://youtube.com/@sevenpoundhalo">YouTube</a>
</section>

<div class="footer">
  © 2026 Seven Pound Halo
</div>

</body>
</html>
